name: Update prediction pages

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Optional number of markets to update"
        required: false
        type: string
      market_id:
        description: "Optional single Manifold market id to update"
        required: false
        type: string

concurrency:
  group: update-prediction-pages
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate predictions
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MARKET_UPDATE_LIMIT: ${{ github.event.inputs.limit }}
          MARKET_UPDATE_ID: ${{ github.event.inputs.market_id }}
        run: |
          set -euo pipefail

          args=(--output Markets/MarketNewsPredictions.csv)

          if [ -n "${MARKET_UPDATE_LIMIT:-}" ]; then
            args+=(--limit "$MARKET_UPDATE_LIMIT")
          fi

          if [ -n "${MARKET_UPDATE_ID:-}" ]; then
            args+=(--market-id "$MARKET_UPDATE_ID")
          fi

          python Code/predict_market_news.py "${args[@]}"
          python Code/build_prediction_pages.py
          python Code/render_card_images.py

      - name: Commit updated pages
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Markets/MarketNewsPredictions.csv docs/

          if git diff --cached --quiet; then
            echo "No prediction page changes to commit."
            exit 0
          fi

          git commit -m "Update prediction pages"
          git pull --rebase
          git push
